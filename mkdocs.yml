site_name: GameDev.Land
site_url: https://gamedev.land
nav:
  - Home: index.md
  - Projects:
      - Tower Defense: tower-defense.md
      - Infinite Runner: runner.md
      - Match-3 Game: match3.md
      - PixiJS Template: pixi_project_template.md
  - About: about.md
theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  language: en
  palette:
    - scheme: default
      primary: teal
      accent: lime
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: lime
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Roboto
    code: JetBrains Mono
  features:
    - navigation.top
    - navigation.expand
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.tabs.link
    - content.tooltips
    - content.footnotes

extra_css:
  - css/extra.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:materialx.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/your-github
    - icon: fontawesome/brands/youtube
      link: https://youtube.com/@your-channel
    - icon: fontawesome/brands/discord
      link: https://discord.gg/your-invite
  analytics:
    provider: google
    property: G-9KPG9DDEYS
